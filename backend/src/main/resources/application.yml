server:
  port: 8080

spring:
  # MySQL 数据库
  datasource:
    url: jdbc:mysql://localhost:3306/aichat?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  # Spring AI 配置 - DeepSeek (OpenAI 兼容接口)
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-api-key-here}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.8

# ===== MySQL 配置（生产环境请取消注释并注释掉上面的H2配置）=====
